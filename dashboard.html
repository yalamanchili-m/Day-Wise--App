<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f1f5f9 0%, #e6edf4 100%);
            min-height: 100vh;
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: linear-gradient(145deg, #f1f5f9 0%, #e6edf4 100%);
        }

        .login-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .login-card h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 0.5rem;
            text-align: center;
            letter-spacing: -0.02em;
        }

        .login-card p {
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 0.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: #ffffff;
        }

        .input-group input:focus {
            outline: none;
            border-color: #94a3b8;
            box-shadow: 0 0 0 3px rgba(100,116,139,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background: #1e293b;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: #334155;
            transform: translateY(-2px);
        }

        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* Profile Selector */
        .profile-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
        }

        .profile-container h1 {
            font-size: 2.8rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 0.75rem;
            text-align: center;
            letter-spacing: -0.02em;
        }

        .profile-container p {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 3rem;
            text-align: center;
            font-weight: 400;
        }

        .profiles {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
        }

        .profile {
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .profile:hover {
            transform: translateY(-8px);
        }

        .profile-avatar {
            width: 200px;
            height: 200px;
            margin: 0 auto 1.2rem;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.2rem;
            transition: all 0.4s;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .profile-avatar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .profile:hover .profile-avatar::before {
            left: 100%;
        }

        .profile:hover .profile-avatar {
            box-shadow: 0 28px 40px -12px rgba(0,0,0,0.15);
            transform: scale(1.02);
        }

        .profile-name {
            font-size: 1.25rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 0.35rem;
        }

        .profile-desc {
            font-size: 0.8rem;
            color: #64748b;
        }

        .daily-color { 
            background: linear-gradient(145deg, #fef7e0, #fde6b6);
            border: 1px solid rgba(245,158,11,0.15);
            color: #d97706;
        }
        .finance-color { 
            background: linear-gradient(145deg, #eef2ff, #e0e7ff);
            border: 1px solid rgba(59,130,246,0.15);
            color: #2563eb;
        }
        .meal-color { 
            background: linear-gradient(145deg, #e6f9ed, #d1fae5);
            border: 1px solid rgba(16,185,129,0.15);
            color: #059669;
        }

        /* App Container */
        .app-container {
            min-height: 100vh;
            display: none;
            background: #f8fafc;
        }

        .app-header {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            background: #f1f5f9;
            border: none;
            color: #1e293b;
            padding: 0.55rem 1.4rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #e2e8f0;
            transform: translateX(-3px);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: #64748b;
            padding: 0.55rem 1.4rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-left: auto;
        }

        .logout-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #1e293b;
            font-size: 1rem;
            font-weight: 500;
        }

        .app-frame {
            width: 100%;
            height: calc(100vh - 70px);
            border: none;
            background: #ffffff;
        }

        @media (max-width: 768px) {
            .profile-container h1 { font-size: 2rem; }
            .profile-avatar { width: 140px; height: 140px; font-size: 3rem; }
            .profile-name { font-size: 1rem; }
            .profiles { gap: 1.5rem; }
            .login-card { padding: 1.8rem; }
            .logout-btn { padding: 0.4rem 1rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <h1>welcome back</h1>
            <p>sign in to continue</p>
            <div class="input-group">
                <label>email</label>
                <input type="email" id="loginEmail" placeholder="hello@example.com">
            </div>
            <div class="input-group">
                <label>password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="login-btn" onclick="handleLogin()">sign in →</button>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <!-- Profile Selection Screen -->
    <div id="profileScreen" class="profile-container" style="display: none;">
        <h1>who's managing today?</h1>
        <p>select your workspace to begin</p>
        <div class="profiles">
            <div class="profile" onclick="openApp('daily')">
                <div class="profile-avatar daily-color">📓</div>
                <div class="profile-name">Daily Planner</div>
                <div class="profile-desc">tasks & schedule</div>
            </div>
            
            <div class="profile" onclick="openApp('finance')">
                <div class="profile-avatar finance-color">📊</div>
                <div class="profile-name">Finance Tracker</div>
                <div class="profile-desc">expenses & budgets</div>
            </div>
            
            <div class="profile" onclick="openApp('meal')">
                <div class="profile-avatar meal-color">🍽</div>
                <div class="profile-name">Meal Planner</div>
                <div class="profile-desc">recipes & shopping</div>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div id="appScreen" class="app-container" style="display: none;">
        <div class="app-header" id="appHeader">
            <button class="back-btn" onclick="backToProfiles()">← back to dashboard</button>
            <div class="app-title" id="appTitle"></div>
            <button class="logout-btn" onclick="handleLogout()">sign out →</button>
        </div>
        <iframe id="appFrame" class="app-frame" src=""></iframe>
    </div>

    <script>
        const APPS = {
            daily: {
                name: 'Daily Planner',
                icon: '📓',
                url: 'http://localhost:3000'
            },
            finance: {
                name: 'Finance Tracker',
                icon: '📊',
                url: 'http://localhost:3001'
            },
            meal: {
                name: 'Meal Planner',
                icon: '🍽',
                url: 'http://localhost:5175'
            }
        };

        // Login validation
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            if (!email || !password) {
                errorDiv.textContent = 'Please enter both email and password';
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                errorDiv.textContent = 'Please enter a valid email address';
                return;
            }

            if (password.length < 3) {
                errorDiv.textContent = 'Password must be at least 3 characters';
                return;
            }

            // Login successful - save to localStorage
            errorDiv.textContent = '';
            localStorage.setItem('isLoggedIn', 'true');
            
            // Check if there was a saved app before logout
            const savedApp = localStorage.getItem('currentApp');
            if (savedApp && APPS[savedApp]) {
                // User was in an app before logout
                const app = APPS[savedApp];
                document.getElementById('appTitle').innerHTML = `${app.icon} ${app.name}`;
                document.getElementById('appFrame').src = app.url;
                document.getElementById('profileScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('loginScreen').style.display = 'none';
            } else {
                // Show profile screen
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('profileScreen').style.display = 'flex';
                document.getElementById('appScreen').style.display = 'none';
            }
        }

        function handleLogout() {
            // Clear login state
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('dashboardView');
            localStorage.removeItem('currentApp');
            
            // Show login screen
            document.getElementById('profileScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            
            // Clear iframe
            document.getElementById('appFrame').src = '';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // Save current view to localStorage
        function saveCurrentView(view, appId = null) {
            localStorage.setItem('dashboardView', view);
            if (appId) {
                localStorage.setItem('currentApp', appId);
            } else {
                localStorage.removeItem('currentApp');
            }
        }

        function openApp(appId) {
            const app = APPS[appId];
            if (!app) {
                alert('This module is coming soon!');
                return;
            }
            
            saveCurrentView('app', appId);
            
            document.getElementById('appTitle').innerHTML = `${app.icon} ${app.name}`;
            document.getElementById('appFrame').src = app.url;
            
            document.getElementById('profileScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
        }

        function backToProfiles() {
            saveCurrentView('profiles');
            
            document.getElementById('profileScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('appFrame').src = '';
        }

        // Load saved state on page refresh
        function loadSavedState() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const savedView = localStorage.getItem('dashboardView');
            const savedApp = localStorage.getItem('currentApp');
            
            if (isLoggedIn !== 'true') {
                // Not logged in - show login screen
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('profileScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'none';
                return;
            }
            
            // User is logged in
            if (savedView === 'app' && savedApp && APPS[savedApp]) {
                // Restore the app that was open
                const app = APPS[savedApp];
                document.getElementById('appTitle').innerHTML = `${app.icon} ${app.name}`;
                document.getElementById('appFrame').src = app.url;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('profileScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
            } else {
                // Show profile screen
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('profileScreen').style.display = 'flex';
                document.getElementById('appScreen').style.display = 'none';
            }
        }

        // Allow Enter key to submit login
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const loginScreen = document.getElementById('loginScreen');
                if (loginScreen && loginScreen.style.display !== 'none') {
                    handleLogin();
                }
            }
        });

        // Load saved state when page loads
        loadSavedState();
    </script>
</body>
</html>
